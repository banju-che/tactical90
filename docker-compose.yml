services:
  db:
    image: postgres:16

    environment:
      POSTGRES_DB: tactical90
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 11449646

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    command: python manage.py runserver 0.0.0.0:8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app

    depends_on:
      - db

  frontend:
    build:
      context: ./frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

volumes:
  postgres_data: